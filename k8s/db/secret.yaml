# DB Secret — Kubernetes Secret for Database Credentials
# ============================================================ --- IGNORE ---
# DB Secret — Kubernetes Secret for Database Credentials --- IGNORE ---
# ============================================================ --- IGNORE ---
# This Kubernetes Secret stores the database credentials for the MySQL database used by the application.
# The application deployment references this secret to securely access the database without hardcoding sensitive information in the deployment manifest.
#very important to use secrets for sensitive data like DB credentials and not configmaps or hardcoding in deployment manifests, this is a common question in interviews to test security best practices in Kubernetes.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: graduation-app
type: Opaque
stringData:
  username: "appuser"
  password: "CHANGE_ME_STRONG_PASSWORD"
  database: "appdb"