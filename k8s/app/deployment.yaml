# APP Tier — Spring Boot Application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: graduation-app
  labels:
    app: app
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: app
        tier: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [app]
                topologyKey: kubernetes.io/hostname

      containers:
        - name: app
          image: public.ecr.aws/x0m5t6i2/graduation-app:0fe7d9f
          ports:
            - containerPort: 8080
          env:
            # DB Connection
            - name: DB_HOST
              value: "db-service"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "appdb"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key:  username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key:  password
            # Memcached
            - name: MEMCACHED_HOST
              value: "memcached-service"
            - name: MEMCACHED_PORT
              value: "11211"
            # RabbitMQ
            - name: RABBITMQ_HOST
              value: "rabbitmq-service"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rmq-secret
                  key:  username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rmq-secret
                  key:  password
          resources:
            requests:
              memory: "256Mi"
              cpu:    "100m"
            limits:
              memory: "512Mi"
              cpu:    "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds:       20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds:       10
          volumeMounts:
            - name:      app-storage
              mountPath: /app/data

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-pvc