# Memcached Deployment
# ============================================================
# Memcached Deployment — Caching Layer for App Tier
# ============================================================
# Memcached is used as a caching layer to improve the performance of the application by reducing database load. It is a simple, in-memory key-value store that can be easily deployed in Kubernetes.
# This deployment creates a single replica of the Memcached server, which is sufficient for development and testing environments. In production, you might want to consider using a more robust caching solution or deploying multiple
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached
  namespace: graduation-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memcached
  template:
    metadata:
      labels:
        app: memcached
    spec:
      containers:
        - name: memcached
          image: memcached:1.6-alpine
          ports:
            - containerPort: 11211
          args: ["memcached", "-m", "64"]
          resources:
            requests:
              memory: "64Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "100m"