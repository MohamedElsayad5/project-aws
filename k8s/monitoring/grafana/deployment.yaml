apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          env:
            - name:  GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"        #not real password, i must change it in rael prduction environment, this is just for demo purposes.
            - name:  GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"
          volumeMounts:
            - name:      grafana-storage
              mountPath: /var/lib/grafana
            - name:      grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources

      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
---
# إعداد Prometheus كـ Data Source تلقائياً
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name:      Prometheus
        type:      prometheus
        url:       http://prometheus-service:9090
        isDefault: true
        access:    proxy