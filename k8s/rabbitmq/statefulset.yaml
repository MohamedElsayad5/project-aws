apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: graduation-app
spec:
  serviceName: rabbitmq-service
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - name:          amqp
              containerPort: 5672
            - name:          management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rmq-secret
                  key:  username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rmq-secret
                  key:  password
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"
          livenessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - ping
          initialDelaySeconds: 60   
          periodSeconds: 15
          timeoutSeconds: 5        
          failureThreshold: 3
          readinessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - ping
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5         #
          failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-storage
      spec:
        accessModes:      ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 2Gi