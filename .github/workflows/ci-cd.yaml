# GitHub Actions — CI/CD Pipeline
# Build → Scan → Push ECR → Update Manifests → ArgoCD Sync
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'pom.xml'
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     public.ecr.aws          # Public ECR
  APP_IMAGE_NAME:   graduation-app
  WEB_IMAGE_NAME:   graduation-web

jobs:
# Job 1: Build & Test
  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -B
        working-directory: ./src

      - name: Run Unit Tests
        run: mvn test -B
        working-directory: ./src

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: src/target/*.jar
          retention-days: 1

# Job 2: Build Docker Images
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: src/target/

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image Tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APP Image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/app
          file: ./docker/app/Dockerfile
          push: false
          tags: ${{ env.APP_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/app-image.tar

      - name: Build WEB Image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/web
          file: ./docker/web/Dockerfile
          push: false
          tags: ${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/web-image.tar

      - name: Save Images as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

# Job 3: Security Scan (Trivy)
  security-scan:
    name: 🔍 Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker Images
        run: |
          docker load --input /tmp/app-image.tar
          docker load --input /tmp/web-image.tar

      - name: Run Trivy on APP Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-app-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'          # stop pipeline if vulnerabilities found

      - name: Run Trivy on WEB Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.WEB_IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-web-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Scan Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'

# Job 4: Push to AWS ECR
  push-to-ecr:
    name: 📦 Push to AWS ECR
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker Images
        run: |
          docker load --input /tmp/app-image.tar
          docker load --input /tmp/web-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Tag & Push APP Image
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.APP_IMAGE_NAME }}"

          docker tag ${{ env.APP_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.APP_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

          echo "APP_IMAGE_URI=${ECR_REPO}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Tag & Push WEB Image
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.WEB_IMAGE_NAME }}"

          docker tag ${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

          echo "WEB_IMAGE_URI=${ECR_REPO}:${IMAGE_TAG}" >> $GITHUB_ENV

# Job 5: Update Kubernetes Manifests with New Image Tags & Push Changes to GitHub
  update-manifests:
    name: 📝 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [docker-build, push-to-ecr]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # Personal Access Token with repo permissions

      - name: Update APP Image Tag in Manifest
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_ALIAS=${{ secrets.ECR_ALIAS }}

          # Update image tags in deployment manifests
          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:${IMAGE_TAG}|g" \
            k8s/app/deployment.yaml

          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:${IMAGE_TAG}|g" \
            k8s/web/deployment.yaml

      - name: Commit & Push Changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app/deployment.yaml k8s/web/deployment.yaml
          git commit -m "ci: update image tag to ${{ needs.docker-build.outputs.image-tag }} [skip ci]"
          git push

# Job 6: Send Notification
  notify:
    name: 📧 Send Notification
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: always()

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        |
            [${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }}]
            Pipeline - ${{ github.repository }} - ${{ github.ref_name }}
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            Pipeline Status: ${{ job.status }}
            Repository:      ${{ github.repository }}
            Branch:          ${{ github.ref_name }}
            Commit:          ${{ github.sha }}
            Author:          ${{ github.actor }}
            Image Tag:       ${{ needs.docker-build.outputs.image-tag }}

            View Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}