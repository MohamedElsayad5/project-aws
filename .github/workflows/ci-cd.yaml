# GitHub Actions — CI/CD Pipeline
# Pull Public Images → Push ECR → Update Manifests → ArgoCD Sync
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     public.ecr.aws          # Public ECR
  APP_IMAGE_NAME:   graduation-app
  WEB_IMAGE_NAME:   graduation-web
  # الـ Public Images الأصلية والشغالة للمشروع
  PUBLIC_APP_IMAGE: public.ecr.aws/x0m5t6i2/graduation-app:latest
  PUBLIC_WEB_IMAGE: public.ecr.aws/x0m5t6i2/graduation-web:latest

jobs:
# Job 1: Pull and Prepare Images
  prepare-images:
    name: 🔄 Pull & Tag Public Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image Tag: ${SHORT_SHA}"

      - name: Pull Public Images
        run: |
          docker pull ${{ env.PUBLIC_APP_IMAGE }}
          docker pull ${{ env.PUBLIC_WEB_IMAGE }}

      - name: Save Images as Artifacts
        run: |
          docker save ${{ env.PUBLIC_APP_IMAGE }} -o /tmp/app-image.tar
          docker save ${{ env.PUBLIC_WEB_IMAGE }} -o /tmp/web-image.tar

      - name: Upload Images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

# Job 2: Push to AWS ECR
  push-to-ecr:
    name: 📦 Push to AWS ECR
    runs-on: ubuntu-latest
    needs: prepare-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker Images
        run: |
          docker load --input /tmp/app-image.tar
          docker load --input /tmp/web-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Tag & Push APP Image
        run: |
          IMAGE_TAG=${{ needs.prepare-images.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.APP_IMAGE_NAME }}"

          docker tag ${{ env.PUBLIC_APP_IMAGE }} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.PUBLIC_APP_IMAGE }} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

      - name: Tag & Push WEB Image
        run: |
          IMAGE_TAG=${{ needs.prepare-images.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.WEB_IMAGE_NAME }}"

          docker tag ${{ env.PUBLIC_WEB_IMAGE }} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.PUBLIC_WEB_IMAGE }} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

# Job 3: Update Kubernetes Manifests
  update-manifests:
    name: 📝 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [prepare-images, push-to-ecr]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update APP & WEB Image Tag in Manifest
        run: |
          IMAGE_TAG=${{ needs.prepare-images.outputs.image-tag }}
          ECR_ALIAS=${{ secrets.ECR_ALIAS }}

          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:${IMAGE_TAG}|g" k8s/app/deployment.yaml
          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:${IMAGE_TAG}|g" k8s/web/deployment.yaml

      - name: Commit & Push Changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app/deployment.yaml k8s/web/deployment.yaml
          git commit -m "ci: update image tag to ${{ needs.prepare-images.outputs.image-tag }} [skip ci]"
          git push