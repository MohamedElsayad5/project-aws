# GitHub Actions — CI/CD Pipeline
# Build Docker Images → Push ECR → Update Manifests → ArgoCD Sync
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     public.ecr.aws          # Public ECR
  APP_IMAGE_NAME:   graduation-app
  WEB_IMAGE_NAME:   graduation-web

jobs:
# Job 1: Build Docker Images Directly
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image Tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APP Image
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/app # تم تعديل الـ context للمتاح عندك
          push: false
          tags: ${{ env.APP_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/app-image.tar

      - name: Build WEB Image
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/web
          push: false
          tags: ${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/web-image.tar

      - name: Save Images as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

# Job 2: Push to AWS ECR
  push-to-ecr:
    name: 📦 Push to AWS ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker Images
        run: |
          docker load --input /tmp/app-image.tar
          docker load --input /tmp/web-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Tag & Push APP Image
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.APP_IMAGE_NAME }}"

          docker tag ${{ env.APP_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.APP_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

      - name: Tag & Push WEB Image
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_REPO="${{ env.ECR_REGISTRY }}/${{ secrets.ECR_ALIAS }}/${{ env.WEB_IMAGE_NAME }}"

          docker tag ${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:${IMAGE_TAG}
          docker tag ${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG} ${ECR_REPO}:latest

          docker push ${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REPO}:latest

# Job 3: Update Kubernetes Manifests
  update-manifests:
    name: 📝 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [docker-build, push-to-ecr]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update APP & WEB Image Tag in Manifest
        run: |
          IMAGE_TAG=${{ needs.docker-build.outputs.image-tag }}
          ECR_ALIAS=${{ secrets.ECR_ALIAS }}

          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-app:${IMAGE_TAG}|g" k8s/app/deployment.yaml
          sed -i "s|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:.*|image: public.ecr.aws/${ECR_ALIAS}/graduation-web:${IMAGE_TAG}|g" k8s/web/deployment.yaml

      - name: Commit & Push Changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app/deployment.yaml k8s/web/deployment.yaml
          git commit -m "ci: update image tag to ${{ needs.docker-build.outputs.image-tag }} [skip ci]"
          git push