apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: graduation-project
  source:
    repoURL:        https://github.com/MohamedElsayad5/project-aws.git
    targetRevision: main
    path:           k8s/monitoring
  destination:
    server:    https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true